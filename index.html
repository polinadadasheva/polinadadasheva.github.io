<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Полина — портфолио</title>

  <!--
    Подключаем шрифт Ubuntu с сервиса Google Fonts.
    Это просто значит: браузер сам скачает нужный шрифт с сервера Google,
    тебе для этого ничего делать не нужно, это просто две строчки-ссылки.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Подключаем файл со стилями (там вся "красота": цвета, отступы, размеры) -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- =========================================================
       ШАПКА САЙТА (навигация)
       Она находится в обычном вертикальном потоке страницы,
       НЕ внутри блока с горизонтальной прокруткой — поэтому
       при прокрутке экранов влево-вправо шапка остаётся
       на месте и никуда не убегает.
  ========================================================== -->
  <header class="nav">
    <div class="nav__logo">pd</div>

    <nav class="nav__menu">
      <a href="#screen-works" class="nav__link">работы</a>
      <a href="#screen-about" class="nav__link">обо мне</a>
      <a href="#screen-contact" class="nav__link">контакт</a>

      <!--
        Переключатель языка. Теперь это настоящая ссылка (тег <a>),
        а не кнопка-пустышка — переход делает браузер сам, без JS.
        Ведёт в папку en/, на англоязычную версию этой же страницы.
      -->
      <a class="nav__lang" href="en/index.html" aria-label="Switch to English">
        ru
        <svg class="nav__lang-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12.1046 8H7.89541C7.72924 7.99978 7.56639 8.0418 7.42572 8.12118C7.28506 8.20057 7.17232 8.31408 7.10056 8.44857C7.01656 8.60814 6.98421 8.78568 7.00719 8.96095C7.03017 9.13622 7.10756 9.30217 7.23054 9.4399L9.33513 11.7276C9.41772 11.8131 9.51983 11.8817 9.63455 11.9287C9.74926 11.9757 9.87389 12 10 12C10.1261 12 10.2507 11.9757 10.3655 11.9287C10.4802 11.8817 10.5823 11.8131 10.6649 11.7276L12.7695 9.4399C12.8924 9.30217 12.9698 9.13622 12.9928 8.96095C13.0158 8.78568 12.9834 8.60814 12.8994 8.44857C12.8277 8.31408 12.7149 8.20057 12.5743 8.12118C12.4336 8.0418 12.2708 7.99978 12.1046 8Z" fill="#FF4800"/>
        </svg>
      </a>
    </nav>
  </header>

  <!-- =========================================================
       ОБЛАСТЬ С ГОРИЗОНТАЛЬНОЙ ПРОКРУТКОЙ
       Внутри этого блока "экраны" (секции) стоят в ряд по горизонтали,
       как вагоны поезда. Файл script.js делает так, что обычное
       прокручивание колесиком мыши/свайп пальцем вниз двигает
       этот ряд влево-вправо, а не вверх-вниз.
  ========================================================== -->
  <main class="scroll-area" id="scrollArea">

    <!-- ---------- ЭКРАН 1: ГЛАВНЫЙ ЭКРАН (HERO) ---------- -->
    <section class="screen screen--hero" id="screen-hero">
      <div class="hero__row">
        <div class="hero__row-inner">

          <h1 class="hero__title">
            из<br>
            хаоса<br>
            <!--
              Строка с фото — отдельный flex-блок, чтобы фото точно
              вставало по центру высоты именно этой строки.
              ВАЖНО: сейчас файла картинки еще нет, нужно его добавить.
              1. Открой нужный фрейм в Figma
              2. Кликни правой кнопкой на эту маленькую фотографию
              3. Export → PNG → Export
              4. Положи скачанный файл в папку images и назови его hero-photo.png
            -->
            <span class="hero__line--with-photo">
              в
              <img src="images/hero-photo.png" alt="" class="hero__photo">
            </span>
            <br>
            <span class="hero__title-accent">систему</span>
          </h1>

          <p class="hero__subtitle">
            Полина.<br>
            Проектирую цифровые продукты
          </p>

        </div>
      </div>
    </section>

    <!--
      Дальше будут следующие экраны: "работы", "обо мне", "контакт".
      Добавим их следующими шагами, по одному экрану за раз —
      присылай следующий фрейм из Figma, когда будешь готова.
    -->

  </main>

  <!-- Подключаем файл с "поведением" страницы (горизонтальный скролл и т.д.) -->
  <script src="script.js"></script>
</body>
</html>
