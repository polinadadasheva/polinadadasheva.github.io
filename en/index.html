<!DOCTYPE html>
<html lang="en">
<head>

  <title>Polina — portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

      <a href="#screen-works" class="nav__link">cases</a>

      <div class="hero__row hero__row--en">

        <h1 class="hero__title hero__title--en">

          to

            <img src="../images/hero-photo.png" alt="" class="hero__photo">
          </span>
          <br>
          <span class="hero__title-accent">flow</span>

        <p class="hero__subtitle hero__subtitle--en">
          Polina.<br>
          Designing digital products.
